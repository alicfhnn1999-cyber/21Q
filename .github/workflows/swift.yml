name: Build iOS IPA 📱

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SCHEME: AliCounter
  CONFIGURATION: Release

jobs:
  build:
    name: 🔨 Build iOS IPA
    runs-on: macos-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🔧 Setup Xcode
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: 📦 Install Dependencies
      run: brew install p7zip
    
    - name: 📁 Create Directories
      run: |
        cd AliCounter
        mkdir -p build
        mkdir -p build/export
    
    - name: 🏗️ Build Archive
      run: |
        cd AliCounter
        xcodebuild \
          -project AliCounter.xcodeproj \
          -scheme AliCounter \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          -archivePath build/AliCounter.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: ✅ Verify Archive
      run: |
        cd AliCounter
        if [ -d "build/AliCounter.xcarchive" ]; then
          echo "✅ Archive Found!"
          du -sh build/AliCounter.xcarchive
        else
          echo "❌ Archive Not Found!"
          exit 1
        fi
    
    - name: 📋 Create Export Options
      run: |
        cd AliCounter
        cat > /tmp/ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>destination</key>
            <string>generic/platform=iOS</string>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
        </dict>
        </plist>
        EOF
    
    - name: 💾 Export IPA
      run: |
        cd AliCounter
        xcodebuild \
          -exportArchive \
          -archivePath build/AliCounter.xcarchive \
          -exportOptionsPlist /tmp/ExportOptions.plist \
          -exportPath build/export \
          -allowProvisioningUpdates
    
    - name: 📊 Verify IPA
      run: |
        cd AliCounter
        if [ -f "build/export/AliCounter.ipa" ]; then
          echo "✅✅✅ IPA CREATED! ✅✅✅"
          ls -lh build/export/AliCounter.ipa
        else
          echo "❌ IPA not found!"
          ls -la build/export/
        fi
    
    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AliCounter-IPA
        path: AliCounter/build/export/AliCounter.ipa
        retention-days: 90
    
    - name: ✅ Build Complete
      run: |
        echo "✅ BUILD COMPLETED!"
        echo "📱 Download from: https://github.com/alicfhnn1999-cyber/21Q/actions"
